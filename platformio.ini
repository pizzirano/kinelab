[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200

lib_deps =
    bodmer/TFT_eSPI

build_flags =
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER

    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_ROTATION=3          ; ajuste da rotação do display CYD para a orientação correta

    ; === Pinagem Oficial CYD (ESP32-2432S028) ===
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH

    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1

    -D SPI_FREQUENCY=40000000   ; 55MHz às vezes dá instabilidade, comece com 40MHz
    -D SPI_READ_FREQUENCY=20000000