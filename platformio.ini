[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200

lib_deps =
    bodmer/TFT_eSPI

build_flags =
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER

    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320

    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14

    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1

    -D TFT_INVERSION_ON

    -D LOAD_GLCD
    -D LOAD_FONT2
    -D LOAD_FONT4
    -D LOAD_FONT6
    -D LOAD_FONT7
    -D LOAD_FONT8

    -D SPI_FREQUENCY=40000000